# Local development conveniences. Production hosting is AWS af-south-1
# per ADR 0009; this file is for laptop work only.

services:
  postgres:
    image: postgres:15
    container_name: fokker-pg
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: fokker_dev
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d fokker_dev']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
